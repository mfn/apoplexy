name: Linux build

on:
  pull_request:
    paths:
      - CMakeLists.txt
      - .github/workflows/linux-build.yml
      - src/**
  push:
    branches:
      - main
    paths:
      - CMakeLists.txt
      - .github/workflows/linux-build.yml
      - src/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --no-upgrade \
            gcc \
            cmake \
            make \
            pkg-config \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libcurl4-openssl-dev \
            libzip-dev

      - name: Build apoplexy
        run: |
          cmake -S . -B build/linux -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build/linux

      - name: Check binary version
        run: ./apoplexy --version
