name: Linux build

on:
  pull_request:
    paths:
      - .github/workflows/linux-build.yml
      - src/**
  push:
    branches:
      - master
    paths:
      - .github/workflows/linux-build.yml
      - src/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --no-upgrade \
            gcc \
            make \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libcurl4-openssl-dev \
            libzip-dev

      - name: Build apoplexy
        run: make -C src

      - name: Inspect binary
        run: |
          test -x apoplexy
          file apoplexy
