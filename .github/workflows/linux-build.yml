name: Linux build

on:
  pull_request:
    paths:
      - CMakeLists.txt
      - .github/workflows/linux-build.yml
      - cmake/**
      - scripts/**
      - src/**
      - third_party/PR/**
  push:
    branches:
      - main
    paths:
      - CMakeLists.txt
      - .github/workflows/linux-build.yml
      - cmake/**
      - scripts/**
      - src/**
      - third_party/PR/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Cache apt packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu-24.04-${{ hashFiles('scripts/apt-deps.txt') }}
          restore-keys: apt-ubuntu-24.04-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --no-upgrade \
            $(cat scripts/apt-deps.txt)

      - name: Build apoplexy
        run: |
          cmake -S . -B build/linux -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build/linux

      - name: Check binary version
        run: |
          ./apoplexy --version
          pr_version="$(./pr/pr --version || true)"
          printf '%s\n' "$pr_version"
          grep -F "Princed resources (PR) v1.3.1" <<< "$pr_version"
