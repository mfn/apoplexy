name: Linux build

on:
  pull_request:
    paths:
      - CMakeLists.txt
      - .github/workflows/linux-build.yml
      - .gitmodules
      - cmake/**
      - scripts/**
      - src/**
      - third_party/PR
      - third_party/PR/**
  push:
    branches:
      - main
    paths:
      - CMakeLists.txt
      - .github/workflows/linux-build.yml
      - .gitmodules
      - cmake/**
      - scripts/**
      - src/**
      - third_party/PR
      - third_party/PR/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: Cache apt packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu-24.04-${{ hashFiles('scripts/apt-deps.txt') }}
          restore-keys: apt-ubuntu-24.04-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --no-upgrade \
            $(cat scripts/apt-deps.txt)

      - name: Build apoplexy
        run: |
          cmake -S . -B build/linux -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build/linux

      - name: Check binary version
        run: |
          ./apoplexy --version
          pr_version="$(./pr/pr --version || true)"
          printf '%s\n' "$pr_version"
          grep -F "Princed resources (PR) v1.3.1" <<< "$pr_version"
