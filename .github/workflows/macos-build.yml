name: macOS build

on:
  pull_request:
    paths:
      - CMakeLists.txt
      - .github/workflows/macos-build.yml
      - .gitmodules
      - cmake/**
      - scripts/build-macos.sh
      - src/**
      - third_party/PR
      - third_party/PR/**
      - vcpkg.json
  push:
    branches:
      - main
    paths:
      - CMakeLists.txt
      - .github/workflows/macos-build.yml
      - .gitmodules
      - cmake/**
      - scripts/build-macos.sh
      - src/**
      - third_party/PR
      - third_party/PR/**
      - vcpkg.json
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: true

      - name: Install build tools
        run: |
          if ! brew list cmake >/dev/null 2>&1; then
            brew install cmake
          fi
          if ! brew list pkg-config >/dev/null 2>&1; then
            brew install pkg-config
          fi

      - name: Cache vcpkg tool
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .vcpkg
          key: vcpkg-tool-macos-${{ runner.arch }}-f3e10653cc27d62a37a3763cd84b38bca07c6075
          restore-keys: vcpkg-tool-macos-${{ runner.arch }}-

      - name: Cache vcpkg installed packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vcpkg_installed
          key: vcpkg-installed-macos-${{ runner.arch }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-installed-macos-${{ runner.arch }}-

      - name: Build apoplexy
        run: ./scripts/build-macos.sh

      - name: Check binary version
        run: |
          ./apoplexy --version
          pr_version="$(./pr/pr-darwin --version || true)"
          printf '%s\n' "$pr_version"
          grep -F "Princed resources (PR) v1.3.1" <<< "$pr_version"
