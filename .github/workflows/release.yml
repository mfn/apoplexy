name: Release artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Derive package tag
        id: package
        run: |
          safe_ref="${GITHUB_REF_NAME//\//-}"
          echo "tag=$safe_ref" >> "$GITHUB_OUTPUT"

      - name: Cache apt packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu-24.04-${{ hashFiles('scripts/apt-deps.txt') }}
          restore-keys: apt-ubuntu-24.04-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --no-upgrade \
            $(cat scripts/apt-deps.txt)

      - name: Build apoplexy
        run: |
          cmake -S . -B build/linux -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build/linux
          ./apoplexy --version
          pr_version="$(./pr/pr --version || true)"
          printf '%s\n' "$pr_version"
          grep -F "Princed resources (PR) v1.3.1" <<< "$pr_version"
          file ./pr/pr

      - name: Package release artifact
        run: ./scripts/package-release.sh --tag "${{ steps.package.outputs.tag }}" --platform linux --arch "${{ matrix.arch }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apoplexy-${{ steps.package.outputs.tag }}-linux-${{ matrix.arch }}
          path: dist/apoplexy-${{ steps.package.outputs.tag }}-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Derive package tag
        id: package
        run: |
          safe_ref="${GITHUB_REF_NAME//\//-}"
          echo "tag=$safe_ref" >> "$GITHUB_OUTPUT"

      - name: Install build tools
        run: |
          if ! brew list cmake >/dev/null 2>&1; then
            brew install cmake
          fi
          if ! brew list pkg-config >/dev/null 2>&1; then
            brew install pkg-config
          fi

      - name: Cache vcpkg tool
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .vcpkg
          key: vcpkg-tool-macos-${{ runner.arch }}-f3e10653cc27d62a37a3763cd84b38bca07c6075
          restore-keys: vcpkg-tool-macos-${{ runner.arch }}-

      - name: Cache vcpkg installed packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vcpkg_installed
          key: vcpkg-installed-macos-${{ runner.arch }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-installed-macos-${{ runner.arch }}-

      - name: Build apoplexy
        run: |
          ./scripts/build-macos.sh
          ./apoplexy --version
          pr_version="$(./pr/pr-darwin --version || true)"
          printf '%s\n' "$pr_version"
          grep -F "Princed resources (PR) v1.3.1" <<< "$pr_version"
          file ./pr/pr-darwin

      - name: Package release artifact
        run: ./scripts/package-release.sh --tag "${{ steps.package.outputs.tag }}" --platform macos --arch "${{ matrix.arch }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apoplexy-${{ steps.package.outputs.tag }}-macos-${{ matrix.arch }}
          path: dist/apoplexy-${{ steps.package.outputs.tag }}-macos-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  windows:
    name: Windows x86_64
    runs-on: windows-2022
    timeout-minutes: 15
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Read MSYS2 package list
        id: msys2-deps
        shell: bash
        run: |
          packages=$(tr '\n' ' ' < scripts/msys2-deps.txt)
          echo "packages=$packages" >> "$GITHUB_OUTPUT"

      - name: Cache MSYS2 packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: C:\msys64\var\cache\pacman\pkg
          key: msys2-ucrt64-${{ hashFiles('scripts/msys2-deps.txt') }}
          restore-keys: msys2-ucrt64-

      - name: Set up MSYS2
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          msystem: UCRT64
          install: ${{ steps.msys2-deps.outputs.packages }}

      - name: Derive package tag
        id: package
        run: |
          safe_ref="${GITHUB_REF_NAME//\//-}"
          echo "tag=$safe_ref" >> "$GITHUB_OUTPUT"

      - name: Build apoplexy
        run: |
          bash scripts/build-windows-msys2.sh
          ./apoplexy.exe --version
          pr_version="$(./pr/pr.exe --version || true)"
          printf '%s\n' "$pr_version"
          grep -F "Princed resources (PR) v1.3.1" <<< "$pr_version"

      - name: Package release artifact
        run: ./scripts/package-release.sh --tag "${{ steps.package.outputs.tag }}" --platform windows --arch x86_64

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apoplexy-${{ steps.package.outputs.tag }}-windows-x86_64
          path: dist/apoplexy-${{ steps.package.outputs.tag }}-windows-x86_64.zip
          if-no-files-found: error

  source:
    name: Source snapshot
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Derive package tag
        id: package
        run: |
          safe_ref="${GITHUB_REF_NAME//\//-}"
          echo "tag=$safe_ref" >> "$GITHUB_OUTPUT"

      - name: Create pure source archive
        run: |
          mkdir -p dist
          git archive \
            --format=tar.gz \
            --prefix="apoplexy-${{ steps.package.outputs.tag }}/" \
            -o "dist/apoplexy-${{ steps.package.outputs.tag }}-src.tar.gz" \
            HEAD

      - name: Upload source artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apoplexy-${{ steps.package.outputs.tag }}-src
          path: dist/apoplexy-${{ steps.package.outputs.tag }}-src.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs:
      - linux
      - macos
      - windows
      - source

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Create checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          files: release-assets/*
