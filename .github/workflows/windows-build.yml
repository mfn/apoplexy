name: Windows build

on:
  pull_request:
    paths:
      - CMakeLists.txt
      - .github/workflows/windows-build.yml
      - scripts/build-windows.sh
      - scripts/package-release.sh
      - vcpkg.json
      - src/**
  push:
    branches:
      - main
    paths:
      - CMakeLists.txt
      - .github/workflows/windows-build.yml
      - scripts/build-windows.sh
      - scripts/package-release.sh
      - vcpkg.json
      - src/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: windows-2022
    timeout-minutes: 30
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Cache vcpkg
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .vcpkg
            vcpkg_installed
          key: vcpkg-x64-windows-${{ hashFiles('vcpkg.json') }}

      - name: Build apoplexy
        run: bash scripts/build-windows.sh

      - name: Package release artifact
        run: ./scripts/package-release.sh --tag test --platform windows --arch x86_64

      - name: Check binary version
        run: ./dist/apoplexy-test-windows-x86_64/apoplexy.exe --version
