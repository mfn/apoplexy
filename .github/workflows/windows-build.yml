name: Windows build

on:
  pull_request:
    paths:
      - CMakeLists.txt
      - .github/workflows/windows-build.yml
      - .gitmodules
      - cmake/**
      - scripts/build-windows-msys2.sh
      - src/**
      - third_party/PR
      - third_party/PR/**
  push:
    branches:
      - main
    paths:
      - CMakeLists.txt
      - .github/workflows/windows-build.yml
      - .gitmodules
      - cmake/**
      - scripts/build-windows-msys2.sh
      - src/**
      - third_party/PR
      - third_party/PR/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: windows-2022
    timeout-minutes: 15
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: true

      - name: Read MSYS2 package list
        id: msys2-deps
        shell: bash
        run: |
          packages=$(tr '\n' ' ' < scripts/msys2-deps.txt)
          echo "packages=$packages" >> "$GITHUB_OUTPUT"

      - name: Cache MSYS2 packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: C:\msys64\var\cache\pacman\pkg
          key: msys2-ucrt64-${{ hashFiles('scripts/msys2-deps.txt') }}
          restore-keys: msys2-ucrt64-

      - name: Set up MSYS2
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          msystem: UCRT64
          install: ${{ steps.msys2-deps.outputs.packages }}

      - name: Build apoplexy
        run: bash scripts/build-windows-msys2.sh

      - name: Check binary version
        run: |
          ./apoplexy.exe --version
          pr_version="$(./pr/pr.exe --version || true)"
          printf '%s\n' "$pr_version"
          grep -F "Princed resources (PR) v1.3.1" <<< "$pr_version"
